name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Build main crate
        run: cargo build

      - name: Clippy main crate
        run: cargo clippy -- -D warnings

      - name: Test main crate
        run: cargo test

      - name: Build polyref-gen
        working-directory: tools/polyref-gen
        run: cargo build

      - name: Clippy polyref-gen
        working-directory: tools/polyref-gen
        run: cargo clippy -- -D warnings

      - name: Test polyref-gen
        working-directory: tools/polyref-gen
        run: cargo test

      - name: Build polyref-drift
        working-directory: tools/polyref-drift
        run: cargo build

      - name: Clippy polyref-drift
        working-directory: tools/polyref-drift
        run: cargo clippy -- -D warnings

      - name: Test polyref-drift
        working-directory: tools/polyref-drift
        run: cargo test
